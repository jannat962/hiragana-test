<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiragana-Test-App</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            /* Dark Blue */
            --secondary: #0ea5e9;
            /* Sky Blue */
            --title-blue: #111827;
            /* Near Black Blue for contrast */
            --accent: #f59e0b;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #eef2ff 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .card-hover {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-hover:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .japanese-text {
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 700;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        .btn-gradient {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: opacity 0.3s;
        }

        .btn-gradient:hover {
            opacity: 0.9;
        }

        .option-btn {
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #15803d !important;
        }

        .incorrect {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #b91c1c !important;
        }

        .progress-container {
            height: 6px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #ec4899);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* 3D Card Flip */
        .card-container {
            perspective: 1000px;
            width: 320px;
            height: 420px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .card-front {
            background: white;
            border: 2px solid var(--secondary);
        }

        .card-back {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            transform: rotateY(180deg);
        }

        .hint-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
        }

        .hint-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.25rem;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .hint-item:hover {
            transform: scale(1.1);
            border-color: var(--secondary);
            background: white;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
        }

        .hint-item.vowel { background: #eff6ff; color: var(--primary); }
        .hint-item.consonant { background: white; color: #64748b; border: 1px solid #f1f5f9; }
        .hint-item.active { background: var(--primary); color: white; border-color: var(--primary); }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const HIRAGANA_DATA = [
            { h: 'あ', r: 'a' }, { h: 'い', r: 'i' }, { h: 'う', r: 'u' }, { h: 'え', r: 'e' }, { h: 'お', r: 'o' },
            { h: 'か', r: 'ka' }, { h: 'き', r: 'ki' }, { h: 'く', r: 'ku' }, { h: 'け', r: 'ke' }, { h: 'こ', r: 'ko' },
            { h: 'さ', r: 'sa' }, { h: 'し', r: 'shi' }, { h: 'す', r: 'su' }, { h: 'せ', r: 'se' }, { h: 'そ', r: 'so' },
            { h: 'た', r: 'ta' }, { h: 'ち', r: 'chi' }, { h: 'つ', r: 'tsu' }, { h: 'て', r: 'te' }, { h: 'と', r: 'to' },
            { h: 'な', r: 'na' }, { h: 'に', r: 'ni' }, { h: 'ぬ', r: 'nu' }, { h: 'ね', r: 'ne' }, { h: 'の', r: 'no' },
            { h: 'は', r: 'ha' }, { h: 'ひ', r: 'hi' }, { h: 'ふ', r: 'fu' }, { h: 'へ', r: 'he' }, { h: 'ほ', r: 'ho' },
            { h: 'ま', r: 'ma' }, { h: 'み', r: 'mi' }, { h: 'む', r: 'mu' }, { h: 'め', r: 'me' }, { h: 'も', r: 'mo' },
            { h: 'や', r: 'ya' }, { h: 'ゆ', r: 'yu' }, { h: 'よ', r: 'yo' },
            { h: 'ら', r: 'ra' }, { h: 'り', r: 'ri' }, { h: 'る', r: 'ru' }, { h: 'れ', r: 're' }, { h: 'ろ', r: 'ro' },
            { h: 'わ', r: 'wa' }, { h: 'を', r: 'wo' }, { h: 'ん', r: 'n' }
        ];

        const HINTS_DATA = {
            'あ': { mnemonic: 'Looks like an Antenna on a roof.', word: 'あか', romaji_word: 'aka', meaning: 'RED' },
            'い': { mnemonic: 'Two Individuals standing side by side.', word: 'いち', romaji_word: 'ichi', meaning: 'ONE' },
            'う': { mnemonic: 'Looks like a U-turn sign.', word: 'うみ', romaji_word: 'umi', meaning: 'SEA' },
            'え': { mnemonic: 'An Energetic bird flying away.', word: 'え', romaji_word: 'e', meaning: 'PICTURE' },
            'お': { mnemonic: 'A golfer at the tee (On the green).', word: 'おか', romaji_word: 'oka', meaning: 'HILL' },
            'か': { mnemonic: 'A Kite flying in the sky.', word: 'かさ', romaji_word: 'kasa', meaning: 'UMBRELLA' },
            'き': { mnemonic: 'A Key used to open a door.', word: 'きく', romaji_word: 'kiku', meaning: 'CHRYSANTHEMUM' },
            'く': { mnemonic: 'The beak of a Cuckoo bird.', word: 'くつ', romaji_word: 'kutsu', meaning: 'SHOES' },
            'け': { mnemonic: 'A Keg of sake.', word: 'け', romaji_word: 'ke', meaning: 'HAIR' },
            'こ': { mnemonic: 'Two Co-dependent worms.', word: 'こめ', romaji_word: 'kome', meaning: 'RICE' },
            'さ': { mnemonic: 'A Samurai sword slashing.', word: 'さる', romaji_word: 'saru', meaning: 'MONKEY' },
            'し': { mnemonic: 'She has long hair (hook shape).', word: 'しお', romaji_word: 'shio', meaning: 'SALT' },
            'す': { mnemonic: 'A Swing with a loop.', word: 'すいか', romaji_word: 'suika', meaning: 'WATERMELON' },
            'せ': { mnemonic: 'A Sunset over the water.', word: 'せかい', romaji_word: 'sekai', meaning: 'WORLD' },
            'そ': { mnemonic: 'A Sowing needle sewing.', word: 'そら', romaji_word: 'sora', meaning: 'SKY' },
            'た': { mnemonic: 'T-A spelled out.', word: 'たまご', romaji_word: 'tamago', meaning: 'EGG' },
            'ち': { mnemonic: 'A Cheerleader doing a split.', word: 'ちいさい', romaji_word: 'chiisai', meaning: 'SMALL' },
            'つ': { mnemonic: 'A Tsunami wave.', word: 'つくえ', romaji_word: 'tsukue', meaning: 'DESK' },
            'て': { mnemonic: 'A dog\'s Tail.', word: 'て', romaji_word: 'te', meaning: 'HAND' },
            'と': { mnemonic: 'A Toe with a splinter.', word: 'とり', romaji_word: 'tori', meaning: 'BIRD' },
            'な': { mnemonic: 'A Nun kneeling at a cross.', word: 'なまえ', romaji_word: 'namae', meaning: 'NAME' },
            'に': { mnemonic: 'Knee-caps or needles.', word: 'にじ', romaji_word: 'niji', meaning: 'RAINBOW' },
            'ぬ': { mnemonic: 'Noodles with a loop.', word: 'ぬの', romaji_word: 'nuno', meaning: 'CLOTH' },
            'ね': { mnemonic: 'A cat\'s tail (Neko).', word: 'ねこ', romaji_word: 'neko', meaning: 'CAT' },
            'の': { mnemonic: 'A No-smoking sign.', word: 'のり', romaji_word: 'nori', meaning: 'SEAWEED' },
            'は': { mnemonic: 'Ha! A Ha-ha-house.', word: 'はな', romaji_word: 'hana', meaning: 'FLOWER' },
            'ひ': { mnemonic: 'He is laughing (Hee-hee).', word: 'ひかり', romaji_word: 'hikari', meaning: 'LIGHT' },
            'ふ': { mnemonic: 'Mount Fuji.', word: 'ふね', romaji_word: 'fune', meaning: 'SHIP' },
            'へ': { mnemonic: 'A mountain (to Heaven).', word: 'へや', romaji_word: 'heya', meaning: 'ROOM' },
            'ほ': { mnemonic: 'Hot! A chimney on a house.', word: 'ほし', romaji_word: 'hoshi', meaning: 'STAR' },
            'ま': { mnemonic: 'Mama\'s face (or a mask).', word: 'まど', romaji_word: 'mado', meaning: 'WINDOW' },
            'み': { mnemonic: 'Who is she? (Me!).', word: 'みず', romaji_word: 'mizu', meaning: 'WATER' },
            'む': { mnemonic: 'Moo! A cow with a loop.', word: 'むし', romaji_word: 'mushi', meaning: 'INSECT' },
            'め': { mnemonic: 'An eye (Me).', word: 'め', romaji_word: 'me', meaning: 'EYE' },
            'も': { mnemonic: 'A hook for Mo-more fish.', word: 'もも', romaji_word: 'momo', meaning: 'PEACH' },
            'や': { mnemonic: 'A Yak in the grass.', word: 'やま', romaji_word: 'yama', meaning: 'MOUNTAIN' },
            'ゆ': { mnemonic: 'A Unique fish.', word: 'ゆき', romaji_word: 'yuki', meaning: 'SNOW' },
            'よ': { mnemonic: 'A Yo-yo on a string.', word: 'よる', romaji_word: 'yoru', meaning: 'NIGHT' },
            'ら': { mnemonic: 'A Rabbit\'s ear.', word: 'らいねん', romaji_word: 'rainen', meaning: 'NEXT YEAR' },
            'り': { mnemonic: 'Ribbons in the wind.', word: 'りんご', romaji_word: 'ringo', meaning: 'APPLE' },
            'る': { mnemonic: 'A road with a Loop.', word: 'るす', romaji_word: 'rusu', meaning: 'ABSENCE' },
            'れ': { mnemonic: 'An old man Resting.', word: 'れい', romaji_word: 'rei', meaning: 'ZERO' },
            'ろ': { mnemonic: 'A Road with no loop.', word: 'ろく', romaji_word: 'roku', meaning: 'SIX' },
            'わ': { mnemonic: 'A Wasp flying.', word: 'わたしたち', romaji_word: 'watashitachi', meaning: 'WE' },
            'を': { mnemonic: 'Whoa! Someone on a unicycle.', word: 'を', romaji_word: 'wo', meaning: '(PARTICLE)' },
            'ん': { mnemonic: 'The eNd of the alphabet.', word: 'ん', romaji_word: 'n', meaning: 'N' }
        };

        const App = () => {
            const [view, setView] = useState('auth');
            const [quizMode, setQuizMode] = useState('visual');
            const [writingIdx, setWritingIdx] = useState(0);
            const [user, setUser] = useState(null);
            const [isSignup, setIsSignup] = useState(false);
            const [selectedHint, setSelectedHint] = useState(null);
            const [isFlipped, setIsFlipped] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [volume, setVolume] = useState(parseFloat(localStorage.getItem('app_volume') || '1.0'));
            const [preferFemale, setPreferFemale] = useState(localStorage.getItem('prefer_female') !== 'false');
            const [username, setUsername] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [quizList, setQuizList] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(30);
            const [streak, setStreak] = useState(0);
            const [maxStreak, setMaxStreak] = useState(0);
            const [userInput, setUserInput] = useState('');
            const [feedback, setFeedback] = useState(null);
            const [options, setOptions] = useState([]);
            
            const timerRef = useRef(null);
            const writerRef = useRef(null);

            useEffect(() => {
                const stored = localStorage.getItem('current_user');
                if (stored) {
                    try { setUser(JSON.parse(stored)); setView('dashboard'); } catch(e) {}
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('app_volume', volume);
                localStorage.setItem('prefer_female', preferFemale);
            }, [volume, preferFemale]);

            useEffect(() => {
                if (view === 'quiz' && !feedback && timeLeft > 0) {
                    timerRef.current = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0 && !feedback && view === 'quiz') {
                    handleAnswer(null);
                }
                return () => clearInterval(timerRef.current);
            }, [view, feedback, timeLeft]);

            useEffect(() => {
                if (view === 'result') {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#1e3a8a', '#0ea5e9', '#f59e0b'] });
                }
            }, [view]);

            useEffect(() => {
                const container = document.getElementById('writer-canvas');
                const charData = HIRAGANA_DATA[writingIdx];
                if (view !== 'writing' || !container || !charData) return;
                
                container.innerHTML = '';
                const writer = HanziWriter.create('writer-canvas', charData.h, {
                    width: 300, height: 300, padding: 20,
                    strokeColor: '#38bdf8', outlineColor: 'rgba(255,255,255,0.05)',
                    drawingColor: '#f0f9ff', drawingWidth: 20, showOutline: true,
                    showHintAfterMisses: 1, highlightCompleteColor: '#22c55e',
                    charDataLoader: (char, onLoad, onError) => {
                        fetch(`https://cdn.jsdelivr.net/gh/ailectra/kana-json@master/data/${char}.json`)
                            .then(res => res.json()).then(onLoad).catch(onError);
                    }
                });
                writerRef.current = writer;
                writer.quiz({ onComplete: () => confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } }) });
                return () => { if (container) container.innerHTML = ''; };
            }, [view, writingIdx]);

            const playAudio = (text) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'ja-JP';
                
                // Respect user volume but keep it clear
                ut.volume = volume; 
                ut.rate = 0.9;
                ut.pitch = 1.0;
                
                const setVoice = () => {
                    const voices = window.speechSynthesis.getVoices();
                    let bestVoice = voices.find(v => v.name.includes('Google 日本語')) || 
                                    voices.find(v => v.name.includes('Kyoko')) ||
                                    voices.find(v => v.name.includes('Haruka')) ||
                                    voices.find(v => v.lang.includes('ja'));

                    if (bestVoice) ut.voice = bestVoice;
                    window.speechSynthesis.speak(ut);
                };

                if (window.speechSynthesis.getVoices().length === 0) {
                    window.speechSynthesis.onvoiceschanged = setVoice;
                } else {
                    setVoice();
                }

                ut.onstart = () => setIsPlaying(true);
                ut.onend = () => setIsPlaying(false);
            };

            const handleAuth = (e) => {
                e.preventDefault();
                if (!/^\d{4}$/.test(username)) { setError('ID must be 4 digits.'); return; }
                if (password.length < 6) { setError('Min 6 chars.'); return; }
                if (isSignup) {
                    if (localStorage.getItem(`u_${username}`)) { setError('ID taken.'); return; }
                    const newUser = { username, email, password };
                    localStorage.setItem(`u_${username}`, JSON.stringify(newUser));
                    localStorage.setItem('current_user', JSON.stringify(newUser));
                    setUser(newUser); setView('dashboard');
                } else {
                    const stored = JSON.parse(localStorage.getItem(`u_${username}`));
                    if (stored && stored.password === password) {
                        localStorage.setItem('current_user', JSON.stringify(stored));
                        setUser(stored); setView('dashboard');
                    } else { setError('Invalid credentials.'); }
                }
            };

            const startQuiz = (mode) => {
                let shuffled = [...HIRAGANA_DATA].sort(() => 0.5 - Math.random()).slice(0, 10);
                setQuizList(shuffled);
                setQuizMode(mode);
                setCurrentIndex(0); setScore(0); setStreak(0); setFeedback(null); setUserInput(''); setView('quiz'); setTimeLeft(30);
                if (mode === 'audio') {
                    const opts = HIRAGANA_DATA.filter(it => it.h !== shuffled[0].h).sort(() => 0.5-Math.random()).slice(0,3).map(it => it.h);
                    setOptions([shuffled[0].h, ...opts].sort(() => 0.5-Math.random()));
                    setTimeout(() => playAudio(shuffled[0].h), 500);
                }
            };

            const handleAnswer = (ans) => {
                if (feedback) return;
                const correctChar = quizList[currentIndex].h;
                const correctRomaji = quizList[currentIndex].r;
                const isCorrect = quizMode === 'visual' ? (ans && ans.toLowerCase().trim() === correctRomaji) : ans === correctChar;
                
                if (isCorrect) {
                    setScore(s => s + 1); 
                    setStreak(s => { 
                        const ns = s + 1; 
                        if (ns > maxStreak) {
                            setMaxStreak(ns);
                            // Save high streak to user profile
                            if (user) {
                                const profile = JSON.parse(localStorage.getItem(`u_${user.username}`));
                                if (profile) {
                                    profile.maxStreak = Math.max(profile.maxStreak || 0, ns);
                                    localStorage.setItem(`u_${user.username}`, JSON.stringify(profile));
                                }
                            }
                        } 
                        return ns; 
                    });
                    setFeedback('correct');
                } else { 
                    setStreak(0); 
                    setFeedback('incorrect');
                    // Play correct audio for learning reinforcement
                    setTimeout(() => playAudio(correctChar), 500);
                }
            };

            const handleNext = () => {
                if (currentIndex < 9) {
                    const ni = currentIndex + 1;
                    setCurrentIndex(ni); setFeedback(null); setUserInput(''); setTimeLeft(30);
                    if (quizMode === 'audio') {
                        const opts = HIRAGANA_DATA.filter(it => it.h !== quizList[ni].h).sort(() => 0.5-Math.random()).slice(0,3).map(it => it.h);
                        setOptions([quizList[ni].h, ...opts].sort(() => 0.5-Math.random()));
                        playAudio(quizList[ni].h);
                    } else {
                        setTimeout(() => document.getElementById('quiz-input')?.focus(), 100);
                    }
                } else { setView('result'); }
            };

            const renderView = () => {
                switch(view) {
                    case 'auth': return (
                        <div className="min-h-screen flex items-center justify-center p-6">
                            <div className="glass w-full max-w-md p-10 rounded-[2.5rem] text-center">
                                <div className="mb-8">
                                    <div className="w-20 h-20 bg-[var(--primary)] rounded-3xl mx-auto flex items-center justify-center text-white text-4xl font-black shadow-lg mb-4 floating">あ</div>
                                    <h1 className="text-4xl font-extrabold text-[var(--title-blue)] tracking-tight">Hiragana-<span className="text-[var(--primary)]">Test</span></h1>
                                    <p className="text-gray-500 mt-2">{isSignup ? 'Create your account' : 'Welcome back'}</p>
                                </div>
                                <form onSubmit={handleAuth} className="space-y-4">
                                    <input type="text" placeholder="User ID (4 Digits)" className="w-full p-4 rounded-2xl border-0 ring-1 ring-gray-200 focus:ring-2 focus:ring-[var(--primary)] outline-none text-center text-xl font-bold transition-all" value={username} onChange={e => setUsername(e.target.value)} required />
                                    <input type="password" placeholder="Password" className="w-full p-4 rounded-2xl border-0 ring-1 ring-gray-200 focus:ring-2 focus:ring-[var(--primary)] outline-none transition-all" value={password} onChange={e => setPassword(e.target.value)} required />
                                    {error && <p className="text-red-500 text-sm font-medium">{error}</p>}
                                    <button className="w-full btn-gradient text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-blue-100 transform active:scale-95 transition">
                                        {isSignup ? 'Create Account' : 'Sign In'}
                                    </button>
                                </form>
                                <button onClick={() => { setIsSignup(!isSignup); setError(''); }} className="mt-6 text-[var(--primary)] font-bold hover:underline">
                                    {isSignup ? 'Already have an account? Login' : 'Need an account? Sign up'}
                                </button>
                            </div>
                        </div>
                    );
                    case 'dashboard': return (
                        <div className="min-h-screen flex flex-col items-center justify-center p-8">
                            <div className="max-w-4xl w-full">
                                <div className="flex justify-between items-center mb-12">
                                    <div className="text-left">
                                        <h2 className="text-4xl font-black text-[var(--title-blue)]">Hello, <span className="text-[var(--primary)]">ID {user?.username}</span></h2>
                                        <p className="text-gray-500">Ready to master Hiragana today?</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowSettings(true)} className="glass px-6 py-3 rounded-2xl font-bold text-gray-600 hover:bg-white transition-colors">Settings</button>
                                        <button onClick={() => { localStorage.removeItem('current_user'); setView('auth'); }} className="glass px-6 py-3 rounded-2xl font-bold text-red-500 hover:bg-red-50 transition-colors">Logout</button>
                                    </div>
                                </div>
                                <div className="grid lg:grid-cols-3 gap-8">
                                    <div onClick={() => startQuiz('visual')} className="glass p-10 rounded-[3rem] card-hover cursor-pointer relative overflow-hidden group">
                                        <div className="text-6xl mb-6">👁️</div><h3 className="text-2xl font-bold text-gray-800 mb-2">Visual</h3><p className="text-gray-500 mb-8 leading-relaxed text-sm">Identify characters and type romaji.</p><div className="text-indigo-600 font-bold">Start →</div>
                                    </div>
                                    <div onClick={() => startQuiz('audio')} className="glass p-10 rounded-[3rem] card-hover cursor-pointer relative overflow-hidden group">
                                        <div className="text-6xl mb-6">🎧</div><h3 className="text-2xl font-bold text-gray-800 mb-2">Listening</h3><p className="text-gray-500 mb-8 leading-relaxed text-sm">Listen and select the correct character.</p><div className="text-pink-600 font-bold">Start →</div>
                                    </div>
                                    <div onClick={() => { setWritingIdx(0); setView('writing'); }} className="glass p-10 rounded-[3rem] card-hover cursor-pointer relative overflow-hidden group border-sky-400 bg-sky-900/10">
                                        <div className="text-6xl mb-6">✍️</div><h3 className="text-2xl font-bold text-gray-800 mb-2">Writing</h3><p className="text-gray-500 mb-8 leading-relaxed text-sm">Master stroke order with interactive drawing.</p><div className="text-sky-600 font-bold">Start Practice →</div>
                                    </div>
                                    <div onClick={() => setView('hints_grid')} className="glass p-10 rounded-[3rem] card-hover cursor-pointer relative overflow-hidden group border-sky-200 lg:col-span-3">
                                        <div className="flex items-center gap-6">
                                            <div className="text-6xl">💡</div>
                                            <div className="text-left">
                                                <h3 className="text-2xl font-bold text-gray-800 mb-1">Memory Hints</h3>
                                                <p className="text-gray-500 text-sm">Visual mnemonics to help you remember.</p>
                                            </div>
                                            <div className="ml-auto text-sky-600 font-bold text-xl">Explore →</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                    case 'hints_grid': return (
                        <div className="min-h-screen flex flex-col items-center p-8 bg-[#f8fafc]">
                            <div className="max-w-4xl w-full">
                                <div className="flex justify-between items-center mb-10">
                                    <button onClick={() => setView('dashboard')} className="glass px-6 py-3 rounded-2xl font-bold text-gray-600 hover:bg-white transition-all">← Dashboard</button>
                                    <h2 className="text-3xl font-black text-[var(--primary)]">Memory Hints</h2>
                                    <div className="w-32"></div>
                                </div>
                                <div className="glass rounded-[3rem] p-10 bg-white/80">
                                    <div className="grid grid-cols-5 md:grid-cols-10 gap-4">
                                        {HIRAGANA_DATA.map((item, i) => (
                                            <div key={i} onClick={() => { setSelectedHint(item); setIsFlipped(false); setView('hints_card'); }} className="hint-item consonant">{item.h}</div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                    case 'hints_card': 
                        const hint = HINTS_DATA[selectedHint.h];
                        return (
                        <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#f0f9ff]">
                            <div className="w-full max-w-md">
                                <button onClick={() => setView('hints_grid')} className="text-sky-600 font-bold mb-8 block">← Back to List</button>
                                <div className={`card-container ${isFlipped ? 'flipped' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className="card-inner">
                                        <div className="card-front">
                                            <div className="text-[120px] text-[var(--primary)] mb-2">{selectedHint.h}</div>
                                            <div className="text-4xl text-sky-400 italic mb-8">{selectedHint.r}</div>
                                            <div className="bg-sky-50 p-6 rounded-3xl border border-sky-100 italic">"{hint.mnemonic}"</div>
                                        </div>
                                        <div className="card-back">
                                            <div className="text-7xl mb-2">{hint.word}</div>
                                            <div className="text-3xl mb-6">({hint.romaji_word})</div>
                                            <div className="text-4xl font-black uppercase">{hint.meaning}</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-8 flex gap-4">
                                    <button onClick={() => playAudio(selectedHint.h)} className="flex-1 py-5 bg-white text-[var(--primary)] rounded-[2rem] font-bold border border-sky-100 hover:scale-105 transition">🔊 Play Audio</button>
                                    <button onClick={() => {
                                        const idx = HIRAGANA_DATA.findIndex(d => d.h === selectedHint.h);
                                        setSelectedHint(HIRAGANA_DATA[(idx + 1) % HIRAGANA_DATA.length]);
                                        setIsFlipped(false);
                                    }} className="flex-1 py-5 bg-[var(--primary)] text-white rounded-[2rem] font-bold hover:scale-105 transition">Next →</button>
                                </div>
                            </div>
                        </div>
                    );
                    case 'writing':
                        const wData = HIRAGANA_DATA[writingIdx];
                        return (
                        <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#0f172a]">
                            <div className="w-full max-w-md text-center">
                                <div className="flex justify-between items-center mb-8">
                                    <button onClick={() => setView('dashboard')} className="text-sky-400 font-bold">← Quit</button>
                                    <div className="text-sky-200/50 font-bold text-sm">{writingIdx + 1} / {HIRAGANA_DATA.length}</div>
                                    <div className="w-10"></div>
                                </div>
                                <div className="text-sky-400 text-7xl font-black mb-8">{wData.r}</div>
                                <div className="bg-slate-800 p-8 rounded-[3rem] border border-slate-700 mb-8 shadow-2xl">
                                    <div id="writer-canvas" className="mx-auto bg-white rounded-2xl" style={{ width: '300px', height: '300px' }}></div>
                                </div>
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    <button onClick={() => playAudio(wData.h)} className="py-4 bg-white/10 text-white rounded-2xl font-bold hover:bg-white/20 transition flex items-center justify-center gap-2"><span>🔊</span> Listen</button>
                                    <button onClick={() => writerRef.current.animateCharacter()} className="py-4 bg-orange-500 text-white rounded-2xl font-bold hover:bg-orange-600 transition flex items-center justify-center gap-2"><span>💡</span> Hint</button>
                                </div>
                                <div className="grid grid-cols-3 gap-4">
                                    <button onClick={() => setWritingIdx((writingIdx - 1 + HIRAGANA_DATA.length) % HIRAGANA_DATA.length)} className="py-4 bg-slate-700 text-white rounded-2xl font-bold hover:bg-slate-600 transition">Prev</button>
                                    <button onClick={() => { writerRef.current.cancelQuiz(); writerRef.current.quiz(); }} className="py-4 bg-emerald-500 text-white rounded-2xl font-bold hover:bg-emerald-600 transition">Try Again</button>
                                    <button onClick={() => setWritingIdx((writingIdx + 1) % HIRAGANA_DATA.length)} className="py-4 bg-sky-500 text-white rounded-2xl font-bold hover:bg-sky-600 transition">Next</button>
                                </div>
                            </div>
                        </div>
                    );
                    case 'quiz': return (
                        <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#f8fafc]">
                            <div className="w-full max-w-2xl">
                                <div className="flex justify-between items-center mb-4 px-4">
                                    <button onClick={() => setView('dashboard')} className="text-gray-400 hover:text-gray-600 font-bold">← Quit</button>
                                    <div className="flex gap-3">
                                        <div className="glass px-4 py-2 rounded-full font-bold text-gray-600">{currentIndex + 1} / 10</div>
                                        <div className={`glass px-4 py-2 rounded-full font-bold ${timeLeft < 10 ? 'text-red-500' : 'text-indigo-600'}`}>{timeLeft}s</div>
                                    </div>
                                </div>
                                <div className="px-4 mb-8">
                                    <div className="progress-container"><div className="progress-fill" style={{ width: `${(currentIndex + 1) * 10}%` }}></div></div>
                                </div>
                                <div className="glass rounded-[3.5rem] p-12 text-center relative overflow-hidden">
                                    {quizMode === 'visual' ? (
                                        <div>
                                            <div className="japanese-text text-[140px] leading-none mb-4 text-gray-800">{quizList[currentIndex].h}</div>
                                            <p className="text-indigo-400 italic text-sm mb-8">Tip: {HINTS_DATA[quizList[currentIndex].h]?.mnemonic}</p>
                                            <div className="max-w-xs mx-auto">
                                                <input type="text" id="quiz-input" className={`w-full p-6 text-3xl text-center rounded-3xl outline-none ring-2 ring-gray-100 focus:ring-indigo-500 ${feedback === 'correct' ? 'ring-green-500 bg-green-50' : feedback === 'incorrect' ? 'ring-red-500 bg-red-50' : ''}`} placeholder="type romaji..." value={userInput} onChange={e => setUserInput(e.target.value)} disabled={!!feedback} autoFocus onKeyDown={e => e.key === 'Enter' && (feedback ? handleNext() : handleAnswer(userInput))} />
                                                <div className="mt-8">
                                                    {!feedback ? <button onClick={() => handleAnswer(userInput)} className="w-full py-4 btn-gradient text-white rounded-2xl font-bold shadow-lg">Check</button> : <button onClick={handleNext} className="w-full py-4 bg-gray-800 text-white rounded-2xl font-bold">Next →</button>}
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div>
                                            <button onClick={() => playAudio(quizList[currentIndex].h)} className={`w-32 h-32 rounded-full shadow-lg border mb-12 flex items-center justify-center text-5xl mx-auto ${isPlaying ? 'bg-indigo-50 animate-pulse' : 'bg-white'}`}>{isPlaying ? '〰️' : '🔊'}</button>
                                            <div className="grid grid-cols-2 gap-4">
                                                {options.map((opt, i) => (
                                                    <button key={i} onClick={() => handleAnswer(opt)} disabled={!!feedback} className={`option-btn p-8 rounded-3xl text-5xl japanese-text glass font-bold ${feedback === 'correct' && opt === quizList[currentIndex].h ? 'correct' : feedback === 'incorrect' && opt === quizList[currentIndex].h ? 'correct' : feedback === 'incorrect' && opt !== quizList[currentIndex].h ? 'incorrect' : ''}`}>{opt}</button>
                                                ))}
                                            </div>
                                            {feedback && <button onClick={handleNext} className="mt-10 w-full py-5 bg-gray-800 text-white rounded-2xl font-bold">Next Character →</button>}
                                        </div>
                                    )}
                                    {feedback === 'incorrect' && <div className="mt-8 text-red-500 font-bold animate-bounce">Correct: {quizMode === 'visual' ? quizList[currentIndex].r : quizList[currentIndex].h}</div>}
                                </div>
                            </div>
                        </div>
                    );
                    case 'result': return (
                        <div className="min-h-screen flex items-center justify-center p-6 text-center">
                            <div className="glass w-full max-w-md p-16 rounded-[4rem]">
                                <div className="text-7xl mb-6">🏆</div>
                                <h2 className="text-4xl font-black text-[var(--title-blue)] mb-2">Training Done!</h2>
                                <div className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-br from-indigo-600 to-purple-600 mb-8">{score}/10</div>
                                <button onClick={() => setView('dashboard')} className="w-full py-5 btn-gradient text-white rounded-2xl font-bold text-xl shadow-xl">Main Menu</button>
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div className="relative">
                    {renderView()}
                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm">
                            <div className="glass w-full max-w-md p-10 rounded-[3rem] bg-white relative">
                                <button onClick={() => setShowSettings(false)} className="absolute top-6 right-6 text-gray-400 text-2xl font-bold">×</button>
                                <h3 className="text-3xl font-black text-[var(--primary)] mb-8">Settings</h3>
                                <div className="space-y-8">
                                    <div>
                                        <label className="font-bold block mb-4">Volume: {Math.round(volume * 100)}%</label>
                                        <input type="range" min="0" max="1" step="0.1" value={volume} onChange={e => setVolume(parseFloat(e.target.value))} className="w-full accent-sky-500" />
                                    </div>
                                    <div className="flex justify-between items-center p-4 bg-sky-50 rounded-2xl">
                                        <span className="font-bold">Female Voice</span>
                                        <div onClick={() => setPreferFemale(!preferFemale)} className={`w-14 h-8 rounded-full p-1 cursor-pointer transition-colors ${preferFemale ? 'bg-sky-500' : 'bg-gray-300'}`}>
                                            <div className={`bg-white w-6 h-6 rounded-full transition ${preferFemale ? 'translate-x-6' : ''}`}></div>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="w-full py-4 btn-gradient text-white rounded-2xl font-bold shadow-lg transform active:scale-95 transition">Save & Close</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
